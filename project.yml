name: TinyCSV
options:
  bundleIdPrefix: com.tinycsv
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

packages:
  TinyKit:
    path: Packages/TinyKit

targets:
  TinyCSV:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyCSV
        excludes:
          - "Resources"
      - path: Sources/TinyCSV/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyCSV/Resources/AppIcon.icon
        buildPhase: resources
      - path: Sources/TinyCSV/Resources/DocIcons
        buildPhase: resources
    info:
      path: Sources/TinyCSV/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: CSV Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            CFBundleTypeIconFile: doc_csv
            LSItemContentTypes:
              - public.comma-separated-values-text
            CFBundleTypeExtensions:
              - csv
          - CFBundleTypeName: TSV Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            CFBundleTypeIconFile: doc_tsv
            LSItemContentTypes:
              - public.tab-separated-values-text
            CFBundleTypeExtensions:
              - tsv
              - tab
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - txt
              - text
        LSApplicationCategoryType: public.app-category.productivity
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: public.comma-separated-values-text
            UTTypeDescription: CSV Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - csv
          - UTTypeIdentifier: public.tab-separated-values-text
            UTTypeDescription: TSV Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - tsv
                - tab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinycsv.app
        PRODUCT_NAME: "TinyCSV"
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyCSV.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: TinyKit
        product: TinyKit

schemes:
  TinyCSV:
    build:
      targets:
        TinyCSV: all
